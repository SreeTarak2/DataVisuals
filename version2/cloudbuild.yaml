steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/signal-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/signal-backend:latest'
      - '-f'
      - 'version2/backend/Dockerfile'
      - 'version2/backend'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/signal-backend:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/signal-backend:$SHORT_SHA'
      - '--location=us-central1'
      - '--output=/workspace/output'

  # Step 4: Deploy using gcloud (alternative without gke-deploy)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'signal-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/signal-backend:$SHORT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'ENVIRONMENT=production'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600'
      - '--max-instances'
      - '100'

images:
  - 'gcr.io/$PROJECT_ID/signal-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/signal-backend:latest'

# Timeout for the entire build
timeout: '1800s'

# Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
