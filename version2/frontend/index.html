<!doctype html>
<html lang="en">

<head>
  <!-- Essential Meta Tags -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Primary Meta Tags -->
  <title>Signal - Context-Aware AI Analytics Platform</title>
  <meta name="title" content="Signal - Context-Aware AI Analytics Platform" />
  <meta name="description"
    content="The first analytics tool where context works for you. Signal captures business context automatically as a byproduct of use. Reach 99% accuracy." />
  <meta name="keywords"
    content="AI analytics, context-aware AI, business intelligence, data context, tribal knowledge capture, NL-to-SQL accuracy" />
  <meta name="author" content="Signal" />
  <meta name="robots" content="index, follow" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#0A0A0C" />
  <meta name="msapplication-TileColor" content="#0A0A0C" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://signal.ai/" />
  <meta property="og:title" content="Signal - Context-Aware AI Analytics Platform" />
  <meta property="og:description"
    content="The first analytics tool where context documentation is automatic. Capture tribal knowledge and reach 99% accuracy." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:image:alt" content="Signal dashboard showing context graph and AI insights" />
  <meta property="og:site_name" content="Signal" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://signal.ai/" />
  <meta name="twitter:title" content="Signal - Context-Aware AI Analytics Platform" />
  <meta name="twitter:description"
    content="Capture tribal knowledge and reach 99% accuracy with the first context-aware AI analytics platform." />
  <meta name="twitter:image" content="/twitter-image.png" />
  <meta name="twitter:image:alt" content="Signal dashboard showing context graph and AI insights" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Preconnect for Faster Font Loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Typography: Inter (body), IBM Plex Mono (code) — Satoshi is self-hosted -->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />

  <!-- Preload Critical Resources -->
  <link rel="modulepreload" href="/src/main.jsx" />
</head>

<body>
  <!-- Application Root -->
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Fallback for No JavaScript -->
  <noscript>
    <div style="
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: 'Inter', sans-serif;
        background: #0A0A0C;
        color: #ffffff;
        text-align: center;
        padding: 20px;
      ">
      <div>
        <h1 style="font-size: 2rem; margin-bottom: 1rem;">JavaScript Required</h1>
        <p style="font-size: 1.1rem; opacity: 0.8;">
          Signal requires JavaScript to be enabled for the best experience.<br />
          Please enable JavaScript in your browser settings and reload the page.
        </p>
      </div>
    </div>
  </noscript>
</body>

</html>
